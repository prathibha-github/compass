name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  example-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Run example smoke tests
        run: |
          pytest tests/test_examples.py -v

  unit-fast:
    runs-on: ubuntu-latest
    needs: example-smoke

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Run fast core unit suite
        run: |
          pytest tests/test_checkpoint_system.py tests/test_benchmark_schemas.py tests/test_constitutional_benchmark_core.py tests/test_client_conformance.py -v

  schema-migrations:
    runs-on: ubuntu-latest
    needs: example-smoke

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Run schema migration tests
        run: |
          pytest tests/test_checkpoint_system.py tests/test_benchmark_schemas.py -v

  benchmark-report-validation:
    runs-on: ubuntu-latest
    needs: example-smoke

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Run benchmark report validation tests
        run: |
          pytest tests/test_benchmark_validation.py -v
      - name: Validate benchmark fixture report
        run: |
          python scripts/validate_benchmark_report.py tests/fixtures/benchmark_evaluations_valid.jsonl

  test:
    runs-on: ubuntu-latest
    needs: [example-smoke, unit-fast, schema-migrations, benchmark-report-validation]
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest tests/ -v
